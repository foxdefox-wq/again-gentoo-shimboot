name: build-image
run-name: Build shimboot disk images for all boards

on:
  push:
  workflow_dispatch:
    inputs:
      distro:
        description: 'Distribution to build (debian, alpine, gentoo)'
        required: true
        default: 'gentoo'
        type: choice
        options:
          - gentoo
          - debian
          - alpine
      board:
        description: 'Board to build (leave empty for all boards)'
        required: false
        type: string
      kernel_ver:
        description: 'ChromeOS kernel version (e.g., 5.4.85 for dedede)'
        required: false
        type: string

jobs:
  build:
    permissions:
      contents: write

    strategy: 
      matrix:
        board: [dedede, octopus, grunt, nissa, zork, hatch, snappy, corsola]
        distro: [gentoo]
        include:
          - distro: gentoo
            kernel_ver: "5.4.85"
        exclude:
          - board: octopus
            distro: gentoo
          - board: hatch
            distro: gentoo
          - board: snappy
            distro: gentoo

    runs-on: ubuntu-latest
    steps:
      - name: remove snap
        uses: ading2210/gh-actions-remove-snap@v1
        with:
          disable_man_db: 'true'

      - name: Maximize build space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 6144
          swap-size-mb: 2048
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'

      - name: download repo
        uses: actions/checkout@v4
      
      - name: run build
        run: |
          sudo apt-get update
          sudo apt-get upgrade -y
          
          # Build Gentoo with XFCE and LightDM
          if [ "${{ matrix.board }}" = "dedede" ]; then
            sudo DEBUG=1 ./build_complete.sh ${{ matrix.board }} distro=gentoo compress_img=1 quiet=1 kernel_ver=5.4.85
          else
            sudo DEBUG=1 ./build_complete.sh ${{ matrix.board }} distro=gentoo compress_img=1 quiet=1
          fi

      - name: upload img
        uses: actions/upload-artifact@v4
        with:
          name: shimboot_gentoo_${{ matrix.board }}
          path: data/shimboot_gentoo_${{ matrix.board }}.bin
          compression-level: 7
  
  build-debian:
    permissions:
      contents: write

    strategy: 
      matrix:
        board: [dedede, octopus, grunt, nissa, zork, hatch, snappy, corsola]

    runs-on: ubuntu-latest
    if: github.event.inputs.distro == 'debian' || github.event.inputs.distro == ''
    
    steps:
      - name: remove snap
        uses: ading2210/gh-actions-remove-snap@v1
        with:
          disable_man_db: 'true'

      - name: Maximize build space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 4096
          swap-size-mb: 1024
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'

      - name: download repo
        uses: actions/checkout@v4
      
      - name: run build
        run: |
          sudo apt-get update
          sudo apt-get upgrade -y
          sudo DEBUG=1 ./build_complete.sh ${{ matrix.board }} compress_img=1 quiet=1

      - name: upload img
        uses: actions/upload-artifact@v4
        with:
          name: shimboot_${{ matrix.board }}
          path: data/shimboot_${{ matrix.board }}.bin
          compression-level: 7

      - name: create release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          draft: true
          files: data/shimboot_${{ matrix.board }}.zip

  release:
    needs: [build]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
      
      - name: Create release
        uses: softprops/action-gh-release@v1
        with:
          draft: true
          files: '**/*.zip'